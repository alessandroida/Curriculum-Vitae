<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #f8faff;
            --card-bg: #ffffff;
            --text-main: #12253c;
            --text-muted: #52606f;
            --accent-color: #0b7ff0;
            --accent-soft: #eaf4ff;
            --border-color: #e4edf5;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--primary-bg);
            line-height: 1.6;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }
        .navbar-brand {
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .nav-link {
            font-weight: 600;
            color: var(--text-muted);
            margin: 0 10px;
            transition: color 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--accent-color);
        }

        /* Bottoni */
        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            border-radius: 999px;
            padding: 12px 28px;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(11, 127, 240, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(11, 127, 240, 0.3);
            background-color: #0966c2;
        }

        /* Hero Section */
        .hero-section {
            padding: 160px 0 100px;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-bg) 100%);
        }
        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
        }
        .badge-role {
            background-color: var(--accent-soft);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Sezioni e Card */
        .section-title {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
        }
        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            height: 100%;
            box-shadow: 0 10px 30px rgba(18, 37, 60, 0.03);
            transition: transform 0.3s, border-color 0.3s;
        }
        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }
        .card-icon {
            width: 50px;
            height: 50px;
            background: var(--accent-soft);
            color: var(--accent-color);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .info-card h3 {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 15px;
        }
        .info-card p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }
    </style>
</head>
